<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Calls · Deployment Console</title>
<meta name="viewport" content="width=1440"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="calls/styles.css?v=7"/>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="calls/data.jsx"></script>
<script type="text/babel" src="calls/engine.jsx"></script>
<script type="text/babel" src="calls/shell.jsx"></script>
<script type="text/babel" src="calls/live.jsx"></script>
<script type="text/babel" src="calls/history.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "showCost": true,
  "showLatency": true,
  "drawerLayout": "right",
  "density": "comfortable"
}/*EDITMODE-END*/;

function TweaksPanel({ visible, tweaks, setTweaks, onClose }){
  if (!visible) return null;
  const set = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type:'__edit_mode_set_keys', edits:{ [k]: v } }, '*');
  };
  return (
    <div className="tweaks-panel">
      <div className="tweaks-head">
        <span>Tweaks</span>
        <div className="spacer"/>
        <button className="icon-btn" onClick={onClose}>✕</button>
      </div>
      <div className="tweaks-body">
        <div className="tweak-row">
          <div className="label">Drawer layout</div>
          <div className="seg mini">
            <button className={`seg-btn ${tweaks.drawerLayout==="right"?"on":""}`} onClick={() => set("drawerLayout","right")}>Right drawer</button>
            <button className={`seg-btn ${tweaks.drawerLayout==="split"?"on":""}`} onClick={() => set("drawerLayout","split")}>Split view</button>
          </div>
        </div>
        <div className="tweak-row">
          <div className="label">List density</div>
          <div className="seg mini">
            <button className={`seg-btn ${tweaks.density==="comfortable"?"on":""}`} onClick={() => set("density","comfortable")}>Comfortable</button>
            <button className={`seg-btn ${tweaks.density==="compact"?"on":""}`} onClick={() => set("density","compact")}>Compact</button>
          </div>
        </div>
        <label className="switch">
          <span>Show cost chips</span>
          <input type="checkbox" checked={tweaks.showCost} onChange={e => set("showCost", e.target.checked)}/>
        </label>
        <label className="switch">
          <span>Show latency chips</span>
          <input type="checkbox" checked={tweaks.showLatency} onChange={e => set("showLatency", e.target.checked)}/>
        </label>
      </div>
    </div>
  );
}

function TenantDropdown({ value, onChange, tenants, showLive }){
  const [open, setOpen] = useState(false);
  const ref = React.useRef(null);
  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    const onKey = (e) => { if (e.key === "Escape") setOpen(false); };
    document.addEventListener("mousedown", onDoc);
    document.addEventListener("keydown", onKey);
    return () => { document.removeEventListener("mousedown", onDoc); document.removeEventListener("keydown", onKey); };
  }, [open]);

  const current = value === "__all" ? { id:"__all", name:"All tenants" } : (tenants.find(t => t.id === value) || { name: value });
  const items = [{ id:"__all", name:"All tenants", liveCount: tenants.reduce((a,t) => a + (t.liveCount || 0), 0) }, ...tenants];

  return (
    <div className="td" ref={ref}>
      <span className="td-label">Tenant</span>
      <button type="button" className={`td-trigger ${open?"on":""}`} onClick={() => setOpen(v => !v)} aria-haspopup="listbox" aria-expanded={open}>
        <span className="td-value">{current.name}</span>
        <svg className={`td-chev ${open?"up":""}`} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      </button>
      {open && (
        <div className="td-menu" role="listbox">
          {items.map(t => {
            const isSel = t.id === value;
            return (
              <button key={t.id} role="option" aria-selected={isSel}
                      className={`td-item ${isSel?"sel":""}`}
                      onClick={() => { onChange(t.id); setOpen(false); }}>
                <span className="td-item-name">{t.name}</span>
                {showLive && t.liveCount > 0 && (
                  <span className="td-item-badge"><span className="td-pulse"/>{t.liveCount}</span>
                )}
                {isSel && (
                  <svg className="td-check" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                )}
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

function App(){
  // Persistent tab across refresh
  const [tab, setTab] = useState(() => localStorage.getItem("calls.tab") || "live");
  const [replayId, setReplayId] = useState(null);
  useEffect(() => { localStorage.setItem("calls.tab", tab); }, [tab]);

  const [tenant, setTenant] = useState(() => localStorage.getItem("calls.tenant") || "hanif");
  useEffect(() => { localStorage.setItem("calls.tenant", tenant); }, [tenant]);

  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);

  // Tweaks host protocol
  useEffect(() => {
    const handler = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const onMode = (m) => { setTab(m); setReplayId(null); };
  const tenants = window.CALLS_DATA?.TENANTS || [];
  const liveAll = window.CALLS_DATA?.LIVE_CALLS || [];
  const histAll = window.CALLS_DATA?.HISTORY_CALLS || [];
  const liveCount = tenant === "__all" ? liveAll.length : liveAll.filter(c => c.tenantId === tenant).length;
  const histCount = tenant === "__all" ? histAll.length : histAll.filter(c => c.tenantId === tenant).length;
  const tenantLabel = tenant === "__all" ? "All tenants" : (tenants.find(t => t.id === tenant)?.name || tenant);

  const fullTweaks = { ...tweaks, onMode, tenant, onTenant: setTenant };

  const SubHeader = () => (
    <div className="sub-header">
      <div className="sh-tabs">
        <button className={`sh-tab ${tab==="live"?"on":""}`} onClick={() => onMode("live")}>
          <span className="sh-dot live-dot-xs"/>
          <span>Live</span>
          <span className={`sh-count ${tab==="live"?"on":""}`}>{liveCount}</span>
        </button>
        <button className={`sh-tab ${tab==="history"?"on":""}`} onClick={() => onMode("history")}>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
          <span>History</span>
          <span className={`sh-count ${tab==="history"?"on":""}`}>{histCount}</span>
        </button>
      </div>

      <div className="sh-right">
        <TenantDropdown value={tenant} onChange={setTenant} tenants={tenants} showLive={tab === "live"}/>
      </div>
    </div>
  );

  return (
    <div className="app">
      <Sidebar/>
      <div className="main">
        <TopBar
          tabLabel={replayId ? "Calls · Replay" : (tab === "history" ? `Calls · History · ${tenantLabel}` : `Calls · Live · ${tenantLabel}`)}
        />
        {!replayId && <SubHeader/>}
        {tab === "live" && !replayId && <LiveView tweaks={fullTweaks}/>}
        {tab === "history" && !replayId && <HistoryView onOpen={(id) => setReplayId(id)} tweaks={fullTweaks}/>}
        {replayId && <ReplayView onBack={() => setReplayId(null)} tweaks={fullTweaks}/>}
      </div>
      <TweaksPanel visible={tweaksVisible} tweaks={tweaks} setTweaks={setTweaks} onClose={() => setTweaksVisible(false)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
